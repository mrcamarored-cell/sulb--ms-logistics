async function updateRollingOrderPieces(orderId,secIdx,lotIdx,newPieces,markSubmitted){
  try{
    var order=roOrders.find(function(o){return o.id===orderId;});if(!order)return;
    var sections=JSON.parse(JSON.stringify(order.sections||[]));
    if(!sections[secIdx]||!sections[secIdx].lots[lotIdx])return;
    sections[secIdx].lots[lotIdx].submittedPieces=newPieces;
    if(markSubmitted)sections[secIdx].lots[lotIdx].submitted=true;
    await db.collection("rollingOrders").doc(orderId).update({sections:sections});
  }catch(e){alert("Error: "+e.message);}
}

function getStockSearchResults(){
  var heatQ=stkHeat.trim().toLowerCase();
  var batchQ=stkBatch.trim().toLowerCase();
  var gradeQ=stkGrade.trim().toLowerCase();
  var lenQ=stkLength.trim();
  var locQ=stkLocation.trim().toLowerCase();
  var matQ=stkMatType.trim().toLowerCase();
  var hasFilter=heatQ||batchQ||gradeQ||lenQ||locQ||matQ;
  if(!hasFilter)return null;
  var lenVal=parseFloat(lenQ);
  return Object.values(stockData).filter(function(item){
    if(heatQ&&!(item.heatNo||"").toLowerCase().includes(heatQ))return false;
    if(batchQ&&!(item.batchNo||"").toLowerCase().includes(batchQ))return false;
    if(gradeQ&&!(item.grade||"").toLowerCase().includes(gradeQ))return false;
    if(lenQ&&!isNaN(lenVal)&&parseFloat(item.length||0)!==lenVal)return false;
    if(locQ&&!(item.storageLocation||"").toLowerCase().includes(locQ)&&!(item.storageBin||"").toLowerCase().includes(locQ))return false;
    if(matQ&&!(item.materialType||"").toLowerCase().includes(matQ))return false;
    return true;
  });
}

async function saveTransferOrder(pieces,assignedWorkerId,assignedWorkerName){
  try{
    var rows=pieces.map(function(item){
      return {
        heatNo:item.heatNo||"",strand:item.strand||"",
        batchNo:item.batchNo||"",grade:item.grade||"",
        length:String(item.length||""),materialType:item.materialType||"",
        rollingSize:item.rollingSize||"",
        locationFrom:item.storageLocation||"",
        locationTo:"",quantity:"",remarks:"",
        autoFilled:true
      };
    });
    var ref=await db.collection("transferOrders").add({
      rows:rows,
      assignedWorkerId:assignedWorkerId,
      assignedWorkerName:assignedWorkerName,
      createdBy:S.supervisorName||S.uname,
      date:fmtDate(new Date()),
      status:"pending",
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    return ref.id;
  }catch(e){alert("Error: "+e.message);return null;}
}

  var sectionsHtml=sections.map(function(sec,si){
    var secDone=(sec.lots||[]).length>0&&(sec.lots||[]).every(function(l){return (l.submittedPieces||[]).length>=l.requiredPcs;});
    var secLocked=si>currentSecIdx&&currentSecIdx>=0&&!secDone;
    var secClosed=sec.closed&&!secDone;
    var isCurrentSec=si===currentSecIdx;
    var currentLotIdx=-1;
    if(isCurrentSec){
      for(var li2=0;li2<(sec.lots||[]).length;li2++){
        var l2=sec.lots[li2];
        if(!l2.closed&&(l2.submittedPieces||[]).length<l2.requiredPcs){currentLotIdx=li2;break;}
      }
    }
    var secBg=secDone?'rgba(16,185,129,0.04)':isCurrentSec?'rgba(59,130,246,0.04)':secClosed?'rgba(245,158,11,0.04)':'#f8fafc';
    var secBorder=secDone?'rgba(16,185,129,0.4)':isCurrentSec?'#3b82f6':secClosed?'rgba(245,158,11,0.4)':'rgba(30,58,138,0.12)';
    var lotsHtml=(sec.lots||[]).map(function(lot,li){
      var done=(lot.submittedPieces||[]).length;var req=lot.requiredPcs;
      var lotDone=done>=req||lot.submitted;
      var isCurrentLot=isCurrentSec&&li===currentLotIdx;
      var lotLocked=!lotDone&&!isCurrentLot&&(!isCurrentSec||li>currentLotIdx);
      var lotClosed=lot.closed&&!lotDone;
      var pct=req>0?Math.min(Math.round(done/req*100),100):0;
      var numBg=lotDone?'#10b981':isCurrentLot?'#3b82f6':lotClosed?'#d97706':'rgba(30,58,138,0.12)';

        (lotDone?'<p style="margin:0;font-size:11px;color:#059669;font-weight:600">&#9989; Done</p>':
         isCurrentLot?'<div style="margin-top:4px;background:#e8edf2;border-radius:10px;height:4px"><div style="background:#3b82f6;border-radius:10px;height:4px;width:'+pct+'%"></div></div>':
         lotClosed?'<p style="margin:0;font-size:11px;color:#d97706;font-weight:600">&#9208; Paused</p>':
         '<p style="margin:0;font-size:10px;color:#bbb;font-style:italic">&#128274; Locked</p>')+
        '</div>'+
        '<div style="text-align:right;flex-shrink:0">'+
        '<span class="counter-badge '+(lotDone?'counter-done':'counter-ok')+'">'+done+'/'+req+'</span>'+
        (isCurrentLot&&!secLocked?'<div style="margin-top:6px"><button data-ro-go-step="'+si+'_'+li+'" style="background:linear-gradient(135deg,#1e3a8a,#3b82f6);border:none;border-radius:8px;padding:6px 14px;color:#fff;font-weight:700;font-size:12px;cursor:pointer">'+(done>0?'&#128260; Continue':'&#9654; Start')+'</button></div>':'')+
        '</div></div>';
    }).join('');
    return '<div style="background:'+secBg+';border:2px solid '+secBorder+';border-radius:14px;padding:14px;margin-bottom:12px;opacity:'+(secLocked?'0.35':'1')+'">'+
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+
      '<div style="flex:1">'+
      '<p style="margin:0;font-size:13px;font-weight:800;color:#1e3a8a">&#128196; Section '+(si+1)+': '+sec.sectionSize+'</p>'+
      '<p style="margin:2px 0 0;font-size:11px;color:#4a6080">'+(sec.lots||[]).length+' lot(s) | '+

       secLocked?'<span style="color:#9ab;">&#128274; Locked</span>':'')+
      '</p></div>'+
      '</div>'+
      lotsHtml+'</div>';
  }).join('');
  return topbarW()+'<div class="wrap">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'+
    '<button id="btnRoBackOrder" style="background:rgba(30,58,138,0.08);border:1px solid rgba(30,58,138,0.15);border-radius:8px;padding:8px 14px;color:#1e3a8a;font-weight:600;font-size:13px;cursor:pointer">&#8592; Orders</button>'+
    '<div><p style="font-size:15px;font-weight:800;color:#1e3a8a;margin:0">Rolling Instruction</p>'+

    '<div style="background:#fff;border:1px solid rgba(30,58,138,0.12);border-radius:12px;padding:14px;margin-bottom:16px">'+

    '<span style="font-size:12px;font-weight:700;color:#1e3a8a">Overall Progress</span>'+
    '<span style="font-size:12px;font-weight:700;color:#1e3a8a">'+pctTotal+'%</span></div>'+
    '<div style="background:#e8edf2;border-radius:10px;height:8px">'+
    '<div style="background:linear-gradient(90deg,#1e3a8a,#3b82f6);border-radius:10px;height:8px;width:'+pctTotal+'%"></div></div></div>'+
    sectionsHtml+'</div>';

function xlExport(s){var wb=XLSX.utils.book_new();var wn=(s.workerName||"Worker").replace(/\s+/g,"_");var sn=s.header&&s.header.sheetNo?s.header.sheetNo:"";var dt=s.header&&s.header.date?s.header.date.replace(/-/g,""):"";var supN=(S.supervisorName||"").replace(/\s+/g,"_");var fn="DeliveryNote_"+wn+(sn?"_"+sn:"")+(dt?"_"+dt:"")+(supN?"_"+supN:"")+".xlsx";var ws=XLSX.utils.aoa_to_sheet([["DELIVERY NOTE - SULB Company | MS Logistics"],[],["Sheet No.",sn,"","Date:",s.header?s.header.date:""],["Operator:",s.workerName||"","","ID:",s.workerId||""],["Start:",s.header?s.header.startTime:"","","End:",s.header?s.header.endTime:""],["Duration:",s.timeTaken||""],[],["Sr.","Batch No.","Heat No.","Strand","Rolling Size","Material Type","Grade","Length","Qty (MT)","From","To","Remarks"],...(s.rows||[]).map(function(r,i){return [i+1,r.batchNo,r.heatNo,r.strand,r.rollingSize,r.materialType,r.grade,r.length,r.quantity,r.locationFrom,r.locationTo,r.remarks];})]);ws["!cols"]=[5,14,12,10,18,14,10,8,10,10,10,16].map(function(w){return {wch:w};});XLSX.utils.book_append_sheet(wb,ws,"Delivery Note");XLSX.writeFile(wb,fn);}
