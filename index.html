const FIELD_DEFS=[
  {key:"batchNo",label:"Batch No.",keywords:["batch"]},
  {key:"heatNo",label:"Heat No.",keywords:["heat","ccm heat"]},
  {key:"grade",label:"Grade",keywords:["grade","ccm grade"]},
  {key:"length",label:"Length",keywords:["length","ccm length"]},

  {key:"storageLocation",label:"Location From",keywords:["storage location","storage loc","location"]},
  {key:"storageBin",label:"Storage Bin",keywords:["bin","storage bin"]}
];

function autoDetectColumns(cols){
  var mapping={};
  FIELD_DEFS.forEach(function(fd){
    var found=cols.find(function(c){var cl=c.toLowerCase();return fd.keywords.some(function(k){return cl.includes(k);});});
    mapping[fd.key]=found||"";
  });
  return mapping;
}

function er(){return{heatNo:"",strand:"",batchNo:"",rollingSize:"",materialType:"",rollingLot:"",grade:"",length:"",quantity:"",locationFrom:"",locationTo:"",remarks:"",autoFilled:false,notFound:false,alreadySubmitted:false,reserved:false,reservedBy:""};}
function fmtTime(d){return d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
function fmtDate(d){return d.toISOString().slice(0,10);}
function timeDiff(s,e){var diff=Math.floor((e-s)/1000);var h=Math.floor(diff/3600);var m=Math.floor((diff%3600)/60);var sc=diff%60;return(h>0?h+"h ":"")+m+"m "+sc+"s";}
let allBatchNos=new Set();
let startTime=null;
let stockData={};
let stockLastUpdate="";
let listMode="open";
let reservedBatches={};
let myReservations=[];
let searchQuery="";
let S={
  role:null,uname:"",workerStep:false,workerId:"",workerName:"",workerIdErr:"",supervisorStep:false,supervisorId:"",supervisorName:"",supervisorIdErr:"",adminTab:"online",onlineUsers:[],
  submitted:false,saving:false,timeTaken:"",
  sessions:[],loading:false,delC:null,
  hdr:{sheetNo:"",date:fmtDate(new Date()),operator:"",startTime:"",endTime:""},
  rows:[er()],logoutMsg:false,supTab:"requests"
};
let unsub=null;
let unsubReservations=null;

async function loadAllBatchNos(){
  try{const snap=await db.collection("deliveryNotes").get();allBatchNos=new Set();snap.docs.forEach(function(d){var data=d.data();if(data.rows)data.rows.forEach(function(r){if(r.batchNo)allBatchNos.add(r.batchNo);});});}catch(e){console.log(e);}
}
async function loadStockFromDB(){
  try{
    var snap=await db.collection("stock").get();
    stockData={};
    snap.docs.forEach(function(d){var data=d.data();if(data.batchNo)stockData[data.batchNo]=data;});
    var meta=await db.collection("settings").doc("stockMeta").get();
    stockLastUpdate=meta.exists?(meta.data().updatedAt||""):"";
  }catch(e){console.log(e);}
}
async function loadListMode(){
  try{const doc=await db.collection("settings").doc("listMode").get();if(doc.exists)listMode=doc.data().mode||"open";}catch(e){console.log(e);}
}
function listenReservations(){
  if(unsubReservations)unsubReservations();
  unsubReservations=db.collection("reservations").onSnapshot(function(snap){
    reservedBatches={};
    snap.docs.forEach(function(d){
      var data=d.data();
      var age=(Date.now()-(data.ts||0))/1000;
      if(age<300)reservedBatches[d.id]={workerName:data.workerName,workerId:data.workerId};
    });
  });
}
async function reserveBatch(batch){
  if(!batch)return;
  try{
    await db.collection("reservations").doc(batch).set({workerName:S.workerName,workerId:S.workerId,ts:Date.now(),date:fmtDate(new Date())});
    if(!myReservations.includes(batch))myReservations.push(batch);
  }catch(e){console.log(e);}
}
async function releaseMyReservations(){
  for(var i=0;i<myReservations.length;i++){try{await db.collection("reservations").doc(myReservations[i]).delete();}catch(e){}}
  myReservations=[];
}
function ss(u){Object.assign(S,u);draw();}
function draw(){
  var active=document.activeElement;
  var activeId=active?active.id:null;
  var activeDataR=active?active.dataset.r:null;
  var activeDataF=active?active.dataset.f:null;
  var activeCaret=active&&active.selectionStart!=null?active.selectionStart:null;
  document.getElementById("app").innerHTML=html();
  bind();
  if(activeId){var el=document.getElementById(activeId);if(el){el.focus();if(activeCaret!=null){try{el.setSelectionRange(activeCaret,activeCaret);}catch(e){}}}}
  else if(activeDataR!=null&&activeDataF!=null){
    var inputs=document.querySelectorAll(".ri");
    for(var i=0;i<inputs.length;i++){if(inputs[i].dataset.r===activeDataR&&inputs[i].dataset.f===activeDataF){inputs[i].focus();if(activeCaret!=null){try{inputs[i].setSelectionRange(activeCaret,activeCaret);}catch(e){}}break;}}
  }
}
function html(){
  if(S.logoutMsg)return logoutHTML();
  if(!S.role)return loginHTML();
  if(S.role==="worker"&&S.workerStep)return workerIdHTML();
  if(S.role==="worker")return workerHTML();
  if(S.role==="supervisor"&&S.supervisorStep)return supervisorIdHTML();
  if(S.role==="supervisor"&&showMappingScreen)return mappingScreenHTML();
  if(S.role==="supervisor")return supHTML();
  if(S.role==="admin")return adminHTML();
  return loginHTML();
}

function workerHTML(){
  var rh=S.rows.map(function(row,i){
    var batch=(row.heatNo||"")+(row.strand||"");
    var isDupLocal=batch&&S.rows.filter(function(r,x){return x!==i&&((r.heatNo||"")+(r.strand||""))===batch;}).length>0;
    var isAlreadySubmitted=row.alreadySubmitted;
    var isNotFound=row.notFound;
    var isAutoFilled=row.autoFilled;
    var isReserved=row.reserved;
    var cardClass="row-card"+(isAlreadySubmitted||isDupLocal?" dup":isReserved?" reserved":isNotFound?" notfound":isAutoFilled?" autofilled":"");
    var statusMsg="";
    if(isAlreadySubmitted) statusMsg='<div class="warn">&#9888; Batch No. <strong>'+batch+'</strong> was already submitted!</div>';
    else if(isDupLocal) statusMsg='<div class="warn">&#9888; Batch No. <strong>'+batch+'</strong> duplicated in this request!</div>';
    else if(isReserved) statusMsg='<div class="warn-purple">&#128274; Reserved by <strong>'+row.reservedBy+'</strong>. Choose a different piece.</div>';
    else if(isNotFound&&batch.length>5) statusMsg='<div class="warn-yellow">&#10007; Batch No. <strong>'+batch+'</strong> not available in stock.</div>';

    return '<div class="'+cardClass+'">'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+

      '<div style="display:flex;gap:6px">'+
      '<button class="bc" data-cp="'+i+'">&#128203; Copy</button>'+
      '<button class="bcl" data-cl="'+i+'">&#10006; Clear</button>'+
      (S.rows.length>1?'<button class="br" data-ri="'+i+'">Remove</button>':'')+
      '</div></div>'+
      '<div class="grid2" style="margin-bottom:8px">'+
      '<div><label class="lbl">Rolling Size</label><input placeholder="e.g. HR500/25-25-1" value="'+(row.rollingSize||"")+'" data-r="'+i+'" data-f="rollingSize" class="ri"'+(row.autoFilled?' readonly':'')+'/></div>'+
      '<div><label class="lbl">Material Type</label><input placeholder="e.g. BLT" value="'+(row.materialType||"")+'" data-r="'+i+'" data-f="materialType" class="ri"'+(row.autoFilled?' readonly':'')+'/></div>'+
      '</div>'+

      '<div class="grid3" style="margin-bottom:8px">'+
      '<div><label class="lbl">Heat No.</label><input placeholder="e.g. 1264133" value="'+(row.heatNo||"")+'" data-r="'+i+'" data-f="heatNo" class="ri" inputmode="numeric"/></div>'+
      '<div><label class="lbl">Strand</label><input placeholder="e.g. C01" value="'+(row.strand||"")+'" data-r="'+i+'" data-f="strand" class="ri"/></div>'+
      '<div><label class="lbl">Batch No.</label><input value="'+batch+'" readonly/></div>'+
      '</div>'+
      '<div class="grid3">'+
      '<div><label class="lbl">Grade</label><input placeholder="e.g. HT02" value="'+(row.grade||"")+'" data-r="'+i+'" data-f="grade" class="ri"'+(row.autoFilled?' readonly':'')+'/></div>'+
      '<div><label class="lbl">Length</label><input placeholder="e.g. 12.1" value="'+(row.length||"")+'" data-r="'+i+'" data-f="length" class="ri"'+(row.autoFilled?' readonly':'')+'/></div>'+
      '<div><label class="lbl">Quantity (MT)</label><input placeholder="e.g. 1" value="'+(row.quantity||"")+'" data-r="'+i+'" data-f="quantity" class="ri"/></div>'+
      '</div></div>'+
      '<div class="sub"><div class="sub-title">Location</div>'+
      '<div class="grid2">'+
      '<div><label class="lbl">From</label><input placeholder="e.g. H030" value="'+(row.locationFrom||"")+'" data-r="'+i+'" data-f="locationFrom" class="ri"/></div>'+
      '<div><label class="lbl">To</label><input placeholder="e.g. Melt" value="'+(row.locationTo||"")+'" data-r="'+i+'" data-f="locationTo" class="ri"/></div>'+
      '</div></div>'+
      '<div><label class="lbl">Remarks <span style="color:#dc2626">*</span></label><select data-r="'+i+'" data-f="remarks" class="ri" style="background:#fff"><option value="">-- Select Remark --</option>'+remarksOptions.map(function(opt){return '<option value="'+opt+'"'+( row.remarks===opt?' selected':'')+'>'+opt+'</option>';}).join("")+'</select></div>'+
      statusMsg+'</div>';
  }).join('');
  var modeInfo=listMode==="closed"?
    '<div style="background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#059669;font-weight:600">&#128274; Closed List — Details auto-fill from inventory'+(stockLastUpdate?' | Updated: '+stockLastUpdate:'')+'</div>':
    '<div style="background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#2563eb;font-weight:600">&#128275; Open List — Enter all details manually</div>';
  return topbarW()+'<div class="wrap">'+modeInfo+
    (S.submitted?
      '<div class="sbox"><div style="font-size:50px">&#9989;</div><h3 style="color:#059669;margin:10px 0 4px">Submitted Successfully!</h3><p style="color:#4a6080;font-size:13px">Data saved. Supervisor can see it now.</p><p style="color:#1e3a8a;font-weight:700">'+S.rows.filter(function(r){return r.heatNo;}).length+' piece(s) recorded</p><p style="color:#2563eb;font-size:13px;margin-top:8px">&#128336; Time taken: <strong>'+S.timeTaken+'</strong></p></div><button class="bp" id="btnNew">Enter New Request</button>'
    :
      '<div class="card"><div class="card-title">Request Information</div><div class="grid2">'+
      '<div><label class="lbl">Sheet No.</label><input id="hs" value="'+S.hdr.sheetNo+'"/></div>'+
      '<div><label class="lbl">Date</label><input readonly value="'+S.hdr.date+'"/></div>'+
      '<div><label class="lbl">Operator Name</label><input readonly value="'+S.workerName+'"/></div>'+
      '<div><label class="lbl">Starting Time</label><input readonly value="'+(S.hdr.startTime||"--:--:--")+'"/></div>'+
      '</div></div>'+
      '<div class="card"><div class="card-title">Pieces to Transfer</div>'+rh+
      '<button class="ba" id="btnAdd">+ Add Another Piece</button></div>'+
      '<button class="bp" id="btnSub"'+(S.saving?' disabled style="opacity:0.6"':'')+'>'+
      (S.saving?'Saving...':'Submit &#10003;')+'</button>'
    )+'</div>';
}

          '<div><p style="font-weight:800;color:#1e3a8a;font-size:15px;margin:0">'+s.workerName+' <span style="font-size:12px;color:#4a6080">('+s.workerId+')</span></p>'+
          '<p style="font-size:12px;color:#4a6080;margin:4px 0 0">'+s.date+' | Start: '+(s.startTime||"")+' | End: '+(s.endTime||"")+' | Duration: '+(s.duration||"")+'</p></div>'+

      '</div>';
    }).join(''):'<p style="color:#4a6080;font-size:13px;text-align:center;padding:10px">No active reservations</p>';
    body='<div class="card"><div class="card-title">&#128230; Upload SAP Stock File</div>'+
      '<div style="margin-bottom:8px"><span style="font-size:12px;color:#4a6080">Last updated: '+(stockLastUpdate||"Never")+'</span></div>'+
      '<input type="file" id="stockFile" accept=".xlsx,.xls" style="margin-bottom:10px"/>'+
      '<button class="bs" id="btnClearStock" style="width:100%;padding:10px;margin-top:4px;background:rgba(220,38,38,0.08);color:#dc2626;border:1px solid rgba(220,38,38,0.2)">&#128465; Clear Stock</button>'+
      '<button class="bs" id="btnResetMapping" style="width:100%;padding:10px;margin-top:8px;background:rgba(245,158,11,0.08);color:#d97706;border:1px solid rgba(245,158,11,0.3)">&#128257; Reset Column Mapping</button>'+
      '</div>'+
      '<div class="card"><div class="card-title">&#9881; List Mode</div>'+
      '<div style="display:flex;align-items:center;gap:12px;padding:10px 0">'+
        '<span style="font-size:14px;color:#1e3a8a;font-weight:600">Current Mode:</span>'+
        '<span style="background:'+modeBg+';color:'+modeColor+';border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700">'+(listMode==="closed"?"🔒 Closed List":"🔓 Open List")+'</span>'+

      '</div></div>'+

            results.push({session:s,row:r,rowIdx:ri});

        (sq.length<2?'<p style="color:#4a6080;font-size:13px;text-align:center">Enter at least 2 characters to search</p>':

      '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">'+
      '<div><span class="badge">Sheet: '+(s.header&&s.header.sheetNo?s.header.sheetNo:"--")+'</span>'+
      '<span class="badge">'+(s.rows?s.rows.length:0)+' piece(s)</span>'+
      '<span style="font-size:11px;color:#4a6080">'+(s.timestamp||"")+'</span>'+
      '<div style="margin-top:5px;font-size:12px;color:#4a6080">&#128119; '+(s.workerName||"--")+' (ID: '+(s.workerId||"--")+') | &#128197; '+(s.header&&s.header.date?s.header.date:"")+' | &#9201; '+(s.header&&s.header.startTime?s.header.startTime:"--")+' - '+(s.header&&s.header.endTime?s.header.endTime:"--")+(s.timeTaken?' | &#128336; '+s.timeTaken:"")+'</div></div>'+

  }).join("");
  return topbarS()+'<div class="wrap">'+tabs+stats+sh+'</div>';
}

function xlExport(s){
  var wb=XLSX.utils.book_new();
  var workerName=(s.workerName||"Worker").replace(/\s+/g,"_");
  var sheetNo=s.header&&s.header.sheetNo?s.header.sheetNo:"";
  var dateStr=s.header&&s.header.date?s.header.date.replace(/-/g,""):"";
  var fileName="DeliveryNote_"+workerName+(sheetNo?""+sheetNo:"")+(dateStr?""+dateStr:"")+".xlsx";
  var ws=XLSX.utils.aoa_to_sheet([
    ["DELIVERY NOTE - SULB Company | MS Logistics"],[],
    ["Sheet No.",sheetNo,"","Date:",s.header?s.header.date:""],
    ["Operator:",s.workerName||"","","ID:",s.workerId||""],
    ["Start Time:",s.header?s.header.startTime:"","","End Time:",s.header?s.header.endTime:""],
    ["Time Taken:",s.timeTaken||""],
    [],
    ["Sr.","Batch No.","Heat No.","Strand","Rolling Size","Material Type","Rolling Lot","Grade","Length","Qty (MT)","From","To","Remarks"],
    ...(s.rows||[]).map(function(r,i){return [i+1,r.batchNo,r.heatNo,r.strand,r.rollingSize,r.materialType,r.rollingLot,r.grade,r.length,r.quantity,r.locationFrom,r.locationTo,r.remarks];})
  ]);
  ws["!cols"]=[5,14,12,10,18,14,16,10,8,10,10,10,16].map(function(w){return {wch:w};});
  XLSX.utils.book_append_sheet(wb,ws,"Delivery Note");
  XLSX.writeFile(wb,fileName);
}

// ── Async loaders ──────────────────────────────────────────
async function loadPasswords(){
  try{
    var doc=await db.collection("settings").doc("passwords").get();
    if(doc.exists){
      var data=doc.data();
      if(data.worker) CREDS.Work.pw=data.worker;
      if(data.supervisor) CREDS.Super.pw=data.supervisor;
      if(data.admin) CREDS.Admin.pw=data.admin;
    }
  }catch(e){}
}

async function loadRemarks(){
  try{var doc=await db.collection("settings").doc("remarks").get();
    remarksOptions=doc.exists?(doc.data().options||remarksOptions):remarksOptions;
  }catch(e){}
}

async function loadColumnMapping(){
  try{var doc=await db.collection("settings").doc("columnMapping").get();
    if(doc.exists)columnMapping=doc.data().mapping||null;
  }catch(e){}
}

async function loadDynamicWorkers(){
  try{
    var doc=await db.collection("settings").doc("workers").get();
    if(doc.exists&&doc.data().workers){
      // Merge Firebase workers with default WORKERS
      S.dynamicWorkers=Object.assign({},WORKERS,doc.data().workers);
    } else {
      S.dynamicWorkers=Object.assign({},WORKERS);
    }
  }catch(e){S.dynamicWorkers=Object.assign({},WORKERS);}
}

async function loadDynamicSupervisors(){
  try{
    var doc=await db.collection("settings").doc("supervisors").get();
    if(doc.exists&&doc.data().supervisors){
      dynamicSupervisors=Object.assign({},SUPERVISORS,doc.data().supervisors);
    } else {
      dynamicSupervisors=Object.assign({},SUPERVISORS);
    }
  }catch(e){dynamicSupervisors=Object.assign({},SUPERVISORS);}
}

// ── Presence ───────────────────────────────────────────────
async function registerPresence(name,role){
  try{
    presenceId=presenceId||(Date.now().toString(36)+Math.random().toString(36).slice(2));
    await db.collection("presence").doc(presenceId).set({
      name:name,role:role,
      loginTime:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),
      lastSeen:Date.now(),
      lastSeenFmt:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"})
    });
    if(presenceInterval)clearInterval(presenceInterval);
    presenceInterval=setInterval(async function(){
      try{await db.collection("presence").doc(presenceId).update({
        lastSeen:Date.now(),
        lastSeenFmt:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit",second:"2-digit"})
      });}catch(e){}
    },30000);
  }catch(e){}
}

async function removePresence(){
  if(presenceInterval){clearInterval(presenceInterval);presenceInterval=null;}
  if(!presenceId)return;
  try{await db.collection("presence").doc(presenceId).delete();presenceId=null;}catch(e){}
}

let unsubPresence=null;
function listenPresence(){
  if(unsubPresence)unsubPresence();
  unsubPresence=db.collection("presence").onSnapshot(function(snap){
    var users=[];var now=Date.now();
    snap.docs.forEach(function(d){
      var data=d.data();
      if(data.lastSeen&&(now-data.lastSeen)<120000)users.push(data);
    });
    users.sort(function(a,b){return b.lastSeen-a.lastSeen;});
    ss({onlineUsers:users});
  });
}

// ── Stock upload ───────────────────────────────────────────
async function processUpload(rows,mapping){
  try{
    var items={};
    rows.forEach(function(row){
      var bk=String(row[mapping.batchNo]||"").trim();
      var heat=String(row[mapping.heatNo]||"").trim();
      var strand=bk&&heat?bk.replace(heat,""):"";
      if(bk)items[bk]={batchNo:bk,heatNo:heat,strand:strand,
        grade:String(mapping.grade?row[mapping.grade]||"":""),
        length:String(mapping.length?row[mapping.length]||"":""),
        materialType:String(mapping.materialType?row[mapping.materialType]||"":""),
        availableStock:parseFloat(mapping.availableStock?(row[mapping.availableStock]||0):0),
        storageLocation:String(mapping.storageLocation?row[mapping.storageLocation]||"":""),
        storageBin:String(mapping.storageBin?row[mapping.storageBin]||"":"")};
    });
    var updatedAt=new Date().toLocaleString("en-GB");
    var keys=Object.keys(items);var CHUNK=500;
    // Delete old
    var oldSnap=await db.collection("stock").get();
    for(var i=0;i<oldSnap.docs.length;i+=CHUNK){
      var db1=db.batch();
      oldSnap.docs.slice(i,i+CHUNK).forEach(function(d){db1.delete(d.ref);});
      await db1.commit();
    }
    // Write new
    for(var j=0;j<keys.length;j+=CHUNK){
      var db2=db.batch();
      keys.slice(j,j+CHUNK).forEach(function(k){
        db2.set(db.collection("stock").doc(k.replace(/[/]/g,"_")),items[k]);
      });
      await db2.commit();
    }
    await db.collection("settings").doc("stockMeta").set({updatedAt:updatedAt});
    await db.collection("settings").doc("columnMapping").set({mapping:mapping,savedAt:updatedAt});
    stockData=items;stockLastUpdate=updatedAt;
    showMappingScreen=false;pendingUploadRows=[];pendingFileColumns=[];
    alert("Stock uploaded! "+keys.length+" pieces loaded.");draw();
  }catch(err){alert("Error saving stock: "+err.message);}
}
